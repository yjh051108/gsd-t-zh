name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install
        run: npm ci
      - name: Build src
        run: |
          cp -r src/ dist/
      - name: Deploy
        run: |
          rsync -a src/ remote:src/
